name: Bug report
description: Report a problem with the Lynk & Co integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! 🐞

        **Logs and version numbers are the most important part** — issues without them are very hard to act on. Please fill in as much as you can.

  - type: markdown
    attributes:
      value: |
        ⚠️ **The Lynk & Co 01 (pre-2025) is not supported by this integration.**

        If you have a **pre-2025 01**, please use [Hass-Lynk-Co](https://github.com/Donkie/Hass-Lynk-Co) instead — reports for that model will be closed here.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I have searched the [existing issues](https://github.com/b12e/ha_lynkco_2025/issues?q=is%3Aissue) and this hasn't been reported yet.
          required: true
        - label: I am running the latest version of the integration (please update via HACS first if you can).
          required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      description: HACS → Lynk & Co, or the `version` field in `custom_components/lynkco/manifest.json`.
      placeholder: e.g. 0.5.1
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: Settings → About (Core version).
      placeholder: e.g. 2026.6.0
    validations:
      required: true

  - type: dropdown
    id: car_model
    attributes:
      label: Car model
      options:
        - Lynk & Co 01 (2025)
        - Lynk & Co 02
        - Lynk & Co 08
        - Other / not listed
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual (copied to custom_components)
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear description of the problem, including which entity, sensor, or service is affected.
      placeholder: The battery level sensor shows "unavailable" after the car has been parked overnight...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected ...
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Enable debug logging, reproduce the problem, then paste the `custom_components.lynkco` log lines here.

        **Easiest way:** Settings → Devices & Services → **Lynk & Co** → ⋮ (three dots) → **Enable debug logging**. Reproduce the issue, then **Disable debug logging** to download the log file.

        **Or** add this to `configuration.yaml` and restart:

        ```yaml
        logger:
          default: warning
          logs:
            custom_components.lynkco: debug
        ```

        Logs can also be found at Settings → System → Logs, or in the `home-assistant.log` file.

        ⚠️ **Please redact sensitive data before posting** — your VIN, access/refresh tokens, email address, and GPS coordinates can appear in the logs.
      render: text
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, when it started, related automations, etc.
    validations:
      required: false
